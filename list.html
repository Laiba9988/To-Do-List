<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional To-Do List | Laiba Naveed</title>
<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
    
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}
body{background:#0f172a;color:#fff}
nav{position:sticky;top:0;display:flex;justify-content:space-between;align-items:center;padding:18px 8%;background:#1e293b;box-shadow:0 3px 10px rgba(0,0,0,.3);z-index:100}
.logo{font-size:28px;font-weight:700;color:#38bdf8}
.date{color:#cbd5e1}
.theme-btn{background:#7c3aed;color:#fff;border:none;padding:10px 18px;border-radius:8px;cursor:pointer}
.container{width:90%;max-width:1200px;margin:40px auto}
.action-buttons{display:flex;justify-content:center;gap:15px;flex-wrap:wrap;margin:90px 0 25px}
.btn-export,.btn-clear,button{padding:12px 20px;border:none;border-radius:10px;color:#fff;cursor:pointer;font-weight:600}
.btn-export{background:#16a34a}.btn-clear{background:#dc2626}
button{background:#38bdf8}
.dashboard{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin-bottom:30px}
.card,.task-form,.task-list{background:#1e293b;border-radius:15px;padding:25px;box-shadow:0 5px 20px rgba(0,0,0,.25)}
.card{text-align:center}
.card h2{font-size:38px;color:#38bdf8}
#todoForm{display:grid;gap:16px}
input,textarea,select{width:100%;padding:14px;border:none;border-radius:10px;background:#334155;color:#fff}
textarea{height:120px;resize:none}
.search-section{margin:25px 0}
.filter-section{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:25px}
.filter-btn{background:#334155}.filter-btn.active{background:#38bdf8}
.task{background:#334155;padding:20px;border-radius:12px;margin-bottom:20px;border-left:5px solid #38bdf8}
.task-buttons{display:flex;gap:10px;flex-wrap:wrap;margin-top:15px}
.priority{padding:4px 10px;border-radius:20px;color:#fff;font-size:12px}
.high{background:#ef4444}.medium{background:#f59e0b}.low{background:#22c55e}
.toast{position:fixed;right:20px;bottom:20px;background:#22c55e;color:#fff;padding:15px 20px;border-radius:8px;display:none}
footer{text-align:center;color:#94a3b8;padding:30px}
@media(max-width:768px){nav{flex-direction:column;gap:10px}.action-buttons{margin-top:120px}.dashboard{grid-template-columns:1fr}}

</style>
</head>
<body>
<nav>
<div class="logo">📝 Professional To-Do</div>
<div class="date"><span id="1 week ago-date"></span></div>
<button id="themeToggle" class="theme-btn">🌙 Dark Mode</button>
</nav>
<div class="action-buttons">
<button onclick="exportCSV()" class="btn-export">📤 Export Tasks</button>
<button onclick="clearTasks()" class="btn-clear">🗑 Clear All</button>
</div>
<div class="container">
<section class="dashboard">
<div class="card"><h2 id="totalTasks">0</h2><p>Total Tasks</p></div>
<div class="card"><h2 id="activeTasks">0</h2><p>Active Tasks</p></div>
<div class="card"><h2 id="completedTasks">0</h2><p>Completed</p></div>
<div class="card"><h2 id="completionRate">0%</h2><p>Completion Rate</p></div>
</section>
<section class="task-form">
<h2>Add New Task</h2>
<form id="todoForm">
<input type="text" id="taskTitle" placeholder="Enter Task Title" required>
<textarea id="taskDescription" placeholder="Task Description"></textarea>
<select id="taskPriority">
<option value="High">High Priority</option>
<option value="Medium">Medium Priority</option>
<option value="Low">Low Priority</option>
</select>
<input type="date" id="taskDate">
<button type="submit">➕ Add Task</button>
</form>
</section>
<section class="search-section">
<input type="text" id="searchTask" placeholder="🔍 Search Tasks...">
</section>
<section class="filter-section">
<button class="filter-btn active" data-filter="all">All</button>
<button class="filter-btn" data-filter="active">Active</button>
<button class="filter-btn" data-filter="completed">Completed</button>
</section>
<section class="task-list">
<h2>My Tasks</h2>
<div id="taskContainer"><p class="empty">No Tasks Yet 🚀</p></div>
</section>
</div>
<div id="toast" class="toast">Task Added Successfully</div>
<footer>
<p>© 2026 Laiba Naveed</p>
<p>Professional To-Do List Application | Built with HTML, CSS & JavaScript</p>
</footer>
<script src="script.js"></script>


<script>
// ================================
// Professional To-Do List
// Laiba Naveed
// ================================

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

const form = document.getElementById("todoForm");
const taskContainer = document.getElementById("taskContainer");
const searchInput = document.getElementById("searchTask");
const toast = document.getElementById("toast");
const dateElement = document.getElementById("1 week ago-date");

let currentFilter = "all";

// ================================
// Current Date
// ================================

const today = new Date();

dateElement.innerHTML = today.toDateString();

// ================================
// Add Task
// ================================

form.addEventListener("submit", function (e) {
    e.preventDefault();

    const title = document.getElementById("taskTitle").value.trim();
    const description = document.getElementById("taskDescription").value.trim();
    const priority = document.getElementById("taskPriority").value;
    const date = document.getElementById("taskDate").value;

    const task = {
        id: Date.now(),
        title,
        description,
        priority,
        date,
        completed: false
    };

    tasks.push(task);

    saveTasks();
    displayTasks();

    form.reset();

    showToast("✅ Task Added Successfully");
});

// ================================
// Display Tasks
// ================================

function displayTasks() {

    taskContainer.innerHTML = "";

    let filteredTasks = tasks;

    if (currentFilter === "active") {
        filteredTasks = tasks.filter(task => !task.completed);
    }

    if (currentFilter === "completed") {
        filteredTasks = tasks.filter(task => task.completed);
    }

    const search = searchInput.value.toLowerCase();

    filteredTasks = filteredTasks.filter(task =>
        task.title.toLowerCase().includes(search) ||
        task.description.toLowerCase().includes(search)
    );

    if (filteredTasks.length === 0) {
        taskContainer.innerHTML = `<p class="empty">No Tasks Found 🚀</p>`;
        updateDashboard();
        return;
    }

    filteredTasks.forEach(task => {

        const div = document.createElement("div");

        div.className = "task";

        div.innerHTML = `

            <h3>${task.completed ? "✅" : "📌"} ${task.title}</h3>

            <p>${task.description}</p>

            <br>

            <span class="priority ${task.priority.toLowerCase()}">
                ${task.priority}
            </span>

            <p style="margin-top:10px;">
                📅 ${task.date || "No Due Date"}
            </p>

            <div class="task-buttons">

                <button onclick="toggleTask(${task.id})">
                    ${task.completed ? "↩ Undo" : "✔ Complete"}
                </button>

                <button onclick="deleteTask(${task.id})" style="background:#dc2626;">
                    🗑 Delete
                </button>

            </div>

        `;

        taskContainer.appendChild(div);

    });

    updateDashboard();

}

// ================================
// Complete Task
// ================================

function toggleTask(id) {

    tasks = tasks.map(task => {

        if (task.id === id) {
            task.completed = !task.completed;
        }

        return task;

    });

    saveTasks();

    displayTasks();

}

// ================================
// Delete Task
// ================================

function deleteTask(id) {

    tasks = tasks.filter(task => task.id !== id);

    saveTasks();

    displayTasks();

    showToast("🗑 Task Deleted");

}

// ================================
// Dashboard
// ================================

function updateDashboard() {

    const total = tasks.length;

    const completed = tasks.filter(task => task.completed).length;

    const active = total - completed;

    const rate = total === 0 ? 0 : Math.round((completed / total) * 100);

    document.getElementById("totalTasks").innerText = total;

    document.getElementById("activeTasks").innerText = active;

    document.getElementById("completedTasks").innerText = completed;

    document.getElementById("completionRate").innerText = rate + "%";

}

// ================================
// Save Local Storage
// ================================

function saveTasks() {

    localStorage.setItem("tasks", JSON.stringify(tasks));

}

// ================================
// Search
// ================================

searchInput.addEventListener("keyup", displayTasks);

// ================================
// Filter
// ================================

const filterButtons = document.querySelectorAll(".filter-btn");

filterButtons.forEach(button => {

    button.addEventListener("click", function () {

        filterButtons.forEach(btn => btn.classList.remove("active"));

        this.classList.add("active");

        currentFilter = this.dataset.filter;

        displayTasks();

    });

});

// ================================
// Toast
// ================================

function showToast(message) {

    toast.innerText = message;

    toast.style.display = "block";

    setTimeout(() => {

        toast.style.display = "none";

    }, 2000);

}

// ================================
// Dark / Light Mode
// ================================

const themeBtn = document.getElementById("themeToggle");

let dark = true;

themeBtn.addEventListener("click", () => {

    if (dark) {

        document.body.style.background = "#f1f5f9";
        document.body.style.color = "#000";

        document.querySelector("nav").style.background = "#ffffff";

        document.querySelectorAll(".card,.task-form,.task-list").forEach(card => {

            card.style.background = "#ffffff";
            card.style.color = "#000";

        });

        document.querySelectorAll("input,textarea,select").forEach(input => {

            input.style.background = "#e2e8f0";
            input.style.color = "#000";

        });

        document.querySelectorAll(".task").forEach(task => {

            task.style.background = "#e2e8f0";
            task.style.color = "#000";

        });

        themeBtn.innerHTML = "☀ Light Mode";

    }

    else {

        location.reload();

    }

    dark = !dark;

});

// ================================
// Export CSV
// ================================

function exportCSV() {

    if (tasks.length === 0) {

        alert("No Tasks Available");

        return;

    }

    let csv = "Title,Description,Priority,Date,Completed\n";

    tasks.forEach(task => {

        csv += `"${task.title}","${task.description}","${task.priority}","${task.date}","${task.completed}"\n`;

    });

    const blob = new Blob([csv], { type: "text/csv" });

    const url = window.URL.createObjectURL(blob);

    const a = document.createElement("a");

    a.href = url;

    a.download = "Tasks.csv";

    a.click();

}

// ================================
// Clear All
// ================================

function clearTasks() {

    if (confirm("Are you sure you want to delete all tasks?")) {

        tasks = [];

        saveTasks();

        displayTasks();

        showToast("🗑 All Tasks Deleted");

    }

}

// ================================
// Initial Load
// ================================

displayTasks();
</script>
</body>
</html>
